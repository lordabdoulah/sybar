<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>abdoulah</title>
    <style>
        :root {
            --bg1: #0b1220;
            --bg2: #070b16;
            --card: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
            --text: #e5e7eb;
            --muted: #a3aab8;
            --accent: #22d3ee;
            --accent2: #a78bfa;
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        }

        * { box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            margin: 0;
            direction: rtl;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1000px 500px at 10% -10%, rgba(34, 211, 238, 0.14), transparent 60%),
                radial-gradient(900px 450px at 110% 0%, rgba(167, 139, 250, 0.14), transparent 60%),
                linear-gradient(180deg, var(--bg1), var(--bg2));
            padding: 24px;
            overflow-y: auto;
        }

        .app {
            width: min(920px, 100%);
            padding: 22px;
            margin: 12px auto;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            animation: enter 420ms ease-out;
        }

        @keyframes enter {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h2 {
            margin: 0 0 14px;
            font-weight: 800;
            letter-spacing: 0.2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        label {
            display: block;
            color: var(--muted);
            margin: 10px 0 6px;
            font-size: 14px;
        }

        textarea,
        input[type="number"] {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.07);
            color: var(--text);
            padding: 10px 12px;
            outline: none;
            transition: transform 120ms ease, border-color 160ms ease, box-shadow 160ms ease;
        }

        textarea { resize: vertical; min-height: 120px; }

        textarea:focus,
        input[type="number"]:focus {
            border-color: rgba(34, 211, 238, 0.55);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.18);
            transform: translateY(-1px);
        }

        #modeAdvancedBtn,
        #modeSimpleBtn,
        #createReportBtn {
            border: 0;
            cursor: pointer;
            border-radius: 999px;
            padding: 10px 14px;
            font-weight: 800;
            letter-spacing: 0.2px;
            transition: transform 120ms ease, box-shadow 160ms ease, filter 160ms ease;
            user-select: none;
        }

        #modeAdvancedBtn,
        #modeSimpleBtn {
            background: rgba(255, 255, 255, 0.10);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        #createReportBtn {
            width: 100%;
            margin-top: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #07101c;
            box-shadow: 0 14px 28px rgba(34, 211, 238, 0.10);
        }

        #modeAdvancedBtn:hover,
        #modeSimpleBtn:hover,
        #createReportBtn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        #modeAdvancedBtn:active,
        #modeSimpleBtn:active,
        #createReportBtn:active {
            transform: translateY(0);
        }

        #modeAdvancedBtn.active,
        #modeSimpleBtn.active {
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.20);
            border-color: rgba(167, 139, 250, 0.45);
        }

        #advancedFields {
            margin-top: 14px;
            padding: 14px;
            border-radius: 14px;
            border: 1px dashed rgba(255, 255, 255, 0.20);
            background: rgba(255, 255, 255, 0.05);
            animation: fadeUp 260ms ease-out;
            display: grid;
            gap: 10px;
        }

        @keyframes fadeUp {
            from { transform: translateY(6px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .outputs {
            margin-top: 16px;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            display: grid;
            gap: 8px;
        }

        .outputs span {
            display: inline-block;
            min-width: 90px;
            text-align: center;
            padding: 4px 10px;
            border-radius: 999px;
            margin-right: 8px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.08);
            font-weight: 800;
        }

        #finalSpan {
            background: rgba(34, 211, 238, 0.14);
            border-color: rgba(34, 211, 238, 0.30);
        }

        .pulse {
            animation: pulse 420ms ease-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.96); }
            60% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .mode-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0 6px;
        }
    </style>
</head>
<body>
    <main class="app">
        <h2>تقفيل الشفت</h2>
        <div>
            <label for="">logs:</label>
            <textarea name="" id="logs" cols="30" rows="10" placeholder="مثال: 100&#10;50&#10;-20"></textarea>
        </div>
        <div class="mode-bar">
            <button id="modeAdvancedBtn" type="button">الوضع المتقدم</button>
            <button id="modeSimpleBtn" type="button">الوضع المبسط</button>
        </div>

        <div id="advancedFields" style="display: none;">
            <label for="">هل غايبش عليه فلوس ؟</label>
            <input id="deductDebt" type="number" value="0">
            <label for="">هل في تايمات غلط ؟</label>
            <input id="deductWrongTimes" type="number" value="0">
            <label for="">هل خدت مصروف ؟</label>
            <input id="deductAllowance" type="number" value="0">
            <label for=""> هل في اي مصاريف تانيا (زباله/فودافون كاش/)  ؟</label>
            <input id="deductOther" type="number" value="0">
        </div>

        <button id="createReportBtn" type="button">انشاء التقرير</button>

        <div class="outputs">
            <div id="advancedOutputs" style="display: none;">
                <label for="">المجموع:</label><span id="totalSpan">0</span>
                <label for="">مسحوبات عايبش  :</label><span id="debtSpan">0</span>
                <label for="">تايمات غلط :</label><span id="wrongTimesSpan">0</span>
                <label for="">مصروف :</label><span id="allowanceSpan">0</span>
                <label for="">مصاريف تانية :</label><span id="otherSpan">0</span>
            </div>
            <label for="">المحموع الهائي :</label><span id="finalSpan">0</span>

        </div>
    </main>

    <script>
        let mode = 'simple';

        const logsEl = document.getElementById('logs');
        const advancedFieldsEl = document.getElementById('advancedFields');
        const advancedOutputsEl = document.getElementById('advancedOutputs');

        const modeAdvancedBtn = document.getElementById('modeAdvancedBtn');
        const modeSimpleBtn = document.getElementById('modeSimpleBtn');
        const createReportBtn = document.getElementById('createReportBtn');

        const deductDebtEl = document.getElementById('deductDebt');
        const deductWrongTimesEl = document.getElementById('deductWrongTimes');
        const deductAllowanceEl = document.getElementById('deductAllowance');
        const deductOtherEl = document.getElementById('deductOther');

        const totalSpan = document.getElementById('totalSpan');
        const debtSpan = document.getElementById('debtSpan');
        const wrongTimesSpan = document.getElementById('wrongTimesSpan');
        const allowanceSpan = document.getElementById('allowanceSpan');
        const otherSpan = document.getElementById('otherSpan');
        const finalSpan = document.getElementById('finalSpan');

        function setMode(nextMode) {
            mode = nextMode;
            const showAdvanced = mode !== 'simple';
            advancedFieldsEl.style.display = showAdvanced ? 'grid' : 'none';
            advancedOutputsEl.style.display = showAdvanced ? 'block' : 'none';
            modeAdvancedBtn.classList.toggle('active', showAdvanced);
            modeSimpleBtn.classList.toggle('active', !showAdvanced);
            modeAdvancedBtn.setAttribute('aria-pressed', String(showAdvanced));
            modeSimpleBtn.setAttribute('aria-pressed', String(!showAdvanced));

            if (showAdvanced) {
                logsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                setTimeout(() => {
                    try {
                        logsEl.focus({ preventScroll: true });
                    } catch {
                        logsEl.focus();
                    }
                }, 0);
            }
        }

        function parseLogsSum(text) {
            // نفصل النص لأسطر
            const lines = text
                .split('\n')          // كل سطر لوحده
                .map(line => line.trim()) // نشيل المسافات
                .filter(line => line);    // نشيل السطور الفاضية
            let totals = [];

            // نمشي على كل سطر
            lines.forEach((line, index) => {
                console.log(`Line ${index + 1}:`, line);
                if (line.includes("Total: $")){
                    const start = line.indexOf("Total: $") + "Total: $".length;
                    // const start = line.indexOf(" المجموع: $") + " المجموع: $".length;
                    
                    const end = line.indexOf("]", start);

                    const totalValue = line.substring(start, end).trim();
                    console.log(totalValue)
                    totals.push(parseFloat(totalValue));

                }

            });

        const totalSum = totals.reduce((sum, value) => sum + value, 0);
        console.log(totalSum)
        return totalSum;
        }

                

        function readNumber(el) {
            const n = Number(el.value);
            return Number.isFinite(n) ? n : 0;
        }

        function formatNumber(n) {
            if (!Number.isFinite(n)) return '0';
            return String(n);
        }

        modeAdvancedBtn.addEventListener('click', () => setMode('advanced'));
        modeSimpleBtn.addEventListener('click', () => setMode('simple'));

        createReportBtn.addEventListener('click', () => {
            const total = parseLogsSum(logsEl.value);

            const debt = readNumber(deductDebtEl);
            const wrongTimes = readNumber(deductWrongTimesEl);
            const allowance = readNumber(deductAllowanceEl);
            const other = readNumber(deductOtherEl);

            const deductions = debt + wrongTimes + allowance + other;
            const finalTotal = total - deductions;

            if (mode !== 'simple') {
                totalSpan.textContent = formatNumber(total);
                debtSpan.textContent = formatNumber(debt);
                wrongTimesSpan.textContent = formatNumber(wrongTimes);
                allowanceSpan.textContent = formatNumber(allowance);
                otherSpan.textContent = formatNumber(other);
            }

            finalSpan.textContent = formatNumber(finalTotal);
            finalSpan.classList.remove('pulse');
            void finalSpan.offsetWidth;
            finalSpan.classList.add('pulse');
        });

        setMode('simple');
    </script>

</body>
</html>
